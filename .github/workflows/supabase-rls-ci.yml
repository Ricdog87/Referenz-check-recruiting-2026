name: supabase-rls-ci

on:
  pull_request:
  push:
    branches:
      - main
      - security/backend-block-1-supabase-storage

jobs:
  rls-tests:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link CI project
        run: supabase link --project-ref candiq-ci --password "$SUPABASE_DB_PASSWORD"

      - name: Push schema
        run: supabase db push

      - name: Run pgTAP
        run: supabase test db --linked
