        fill="none" stroke="#7c3aed" stroke-width="10" stroke-linecap="round"/>
  <!-- Inner eye / pupil -->
  <circle cx="42" cy="22" r="4.5" fill="#0f172a"/>
  <!-- Magnifier handle -->
